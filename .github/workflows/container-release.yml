name: Build and Push ddnsCloudflare Docker Image

on:
  release:
    types: [published]  # Trigger only on new releases

jobs:
  build-and-push-ddns-cloudflare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Current DateTime for Version
        run: |
          VERSION=$(date +'%Y%m%d%H%M%S')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}/ddnscloudflare" >> $GITHUB_ENV

      - name: Build and Push the Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containerfiles/ddnsCloudflare.containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:latest
